
<section>
    <app-login-header [hideLogInButton]="hideLogInButton" class="header"></app-login-header>
    <div class="login-container">
        <div class="login-container-bg">
            
            <div class="action-div">
                <h2>Einloggen</h2>
                <form class="login-form" action="">
                    <input placeholder="E-Mail-Adresse" class="login-email-input" type="text">
                    <input placeholder="Passwort" class="login-password-input" type="text">
                    <button class="login-button">Einloggen</button>
                </form>
                <a href="">Passwort vergessen?</a>
               
            </div>
        </div>
      
        
    </div>
    
</section>
<app-login-footer></app-login-footer>
